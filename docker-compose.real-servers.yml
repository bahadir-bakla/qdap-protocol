version: '3.8'

services:
  nginx_http2:
    image: nginx:alpine
    container_name: qdap_nginx_h2
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./tests/real_servers/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tests/real_servers/certs:/etc/nginx/certs:ro
      - ./tests/real_servers/www:/usr/share/nginx/html:ro
    networks:
      - qdap_test_net

  apache_http11:
    image: httpd:alpine
    container_name: qdap_apache_h1
    ports:
      - "8081:80"
    volumes:
      - ./tests/real_servers/www:/usr/local/apache2/htdocs:ro
    networks:
      - qdap_test_net

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: qdap_mosquitto
    ports:
      - "1884:1883"
    volumes:
      - ./tests/real_servers/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - qdap_test_net

  qdap_server:
    build:
      context: .
      dockerfile: tests/real_servers/Dockerfile.qdap
    container_name: qdap_server
    ports:
      - "19999:19999"
    networks:
      - qdap_test_net

networks:
  qdap_test_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
