name: QDAP Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        continue-on-error: true

      - name: Build Rust extension
        continue-on-error: true
        run: |
          pip install maturin
          cd qdap_core && maturin develop --release

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -q --tb=short --timeout=120 --ignore=tests/verification

  verify:
    runs-on: ubuntu-latest
    name: Qiskit Verification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with Qiskit
        run: pip install -e ".[dev,qiskit]"
      - name: Run verification tests
        run: pytest tests/verification/ -q --timeout=180
